# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    # Only run when JS/TS is staged; otherwise lefthook skips the job (no "0 files" oxlint failure).
    - name: oxlint
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: pnpm oxlint:strict -- --fix {staged_files}
      stage_fixed: true
    - name: oxfmt
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,css,md,mdx}"
      run: pnpm oxfmt --write {staged_files}
      stage_fixed: true
