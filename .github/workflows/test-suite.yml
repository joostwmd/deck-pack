# Reusable quality gate: unit + integration (Postgres) + Storybook build + E2E smokes.
name: Test suite

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      # Also set in vitest unit-jsdom config; keep here so any Node-side env reads work in CI.
      VITE_SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test:unit

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: deck_pack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deck_pack_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/deck_pack_test
      # Must stay a YAML string — an unquoted numeric value loses precision (<32 chars → env validation fails).
      BETTER_AUTH_SECRET: "deck-pack-ci-better-auth-placeholder-32-characters-long"
      BETTER_AUTH_URL: https://localhost
      CORS_ORIGINS: https://localhost
      OPS_ORIGINS: https://localhost
      OPS_SIGNUP_EMAIL_DOMAIN: code.berlin
      PORTAL_APP_URL: http://localhost:3002
      PEXELS_API_KEY: test-ci-pexels-key-placeholder
      BRANDFETCH_API_KEY: test-ci-brandfetch-key
      BRANDFETCH_CLIENT_ID: test-ci-brandfetch-client
      NOUN_PROJECT_API_KEY: test-ci-noun-key
      NOUN_PROJECT_API_SECRET: test-ci-noun-secret
      EMAIL_API_KEY: test-ci-email-key-placeholder
      EMAIL_FROM: onboarding@localhost
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply DB schema
        run: pnpm --filter @deck-pack/db exec drizzle-kit push

      - name: Integration tests
        run: pnpm test:integration

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    env:
      VITE_SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

  test-e2e:
    name: E2E smokes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: deck_pack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deck_pack_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      CI: true
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/deck_pack_test
      BETTER_AUTH_SECRET: "deck-pack-ci-better-auth-placeholder-32-characters-long"
      BETTER_AUTH_URL: http://127.0.0.1:3000
      CORS_ORIGINS: http://127.0.0.1:3001,http://127.0.0.1:3002
      OPS_ORIGINS: http://127.0.0.1:3001
      OPS_SIGNUP_EMAIL_DOMAIN: code.berlin
      PORTAL_APP_URL: http://127.0.0.1:3002
      EMAIL_API_KEY: test-ci-email-key-placeholder
      EMAIL_FROM: onboarding@localhost
      PEXELS_API_KEY: test-ci-pexels-key-placeholder
      BRANDFETCH_API_KEY: test-ci-brandfetch-key
      BRANDFETCH_CLIENT_ID: test-ci-brandfetch-client
      NOUN_PROJECT_API_KEY: test-ci-noun-key
      NOUN_PROJECT_API_SECRET: test-ci-noun-secret
      VITE_SERVER_URL: http://127.0.0.1:3000
      E2E_API_URL: http://127.0.0.1:3000
      E2E_OPS_URL: http://127.0.0.1:3001
      E2E_PORTAL_URL: http://127.0.0.1:3002
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply DB schema
        run: pnpm --filter @deck-pack/db exec drizzle-kit push

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
