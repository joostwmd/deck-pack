# One manual run: parallel builds, then simultaneous API restart + prod SWA uploads.
# Run from the branch/commit you want production to match (usually `main` after merging `staging` → `main`).
name: Production — full release (API + frontends)

on:
  workflow_dispatch:

concurrency:
  group: production-full-release
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  api-container-build:
    name: Production — API image (build + push)
    runs-on: ubuntu-latest
    environment: prod
    env:
      IMAGE_REPO: deck-pack-api
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          REGISTRY="${{ vars.ACR_LOGIN_SERVER }}"
          SHA_TAG="${REGISTRY}/${IMAGE_REPO}:${GITHUB_SHA::7}"
          LATEST_TAG="${REGISTRY}/${IMAGE_REPO}:latest"
          TAGS="${SHA_TAG}"$'\n'"${LATEST_TAG}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "extra_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=api-prod
          cache-to: type=gha,mode=max,scope=api-prod

      - name: Summary (API image)
        run: |
          {
            echo "### Production API image (pushed)"
            echo ""
            echo "- \`${{ steps.tags.outputs.sha_tag }}\`"
            echo "- \`${{ steps.tags.outputs.extra_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  swa-ops-build:
    name: Production — OPS (build artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/ops
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL_PROD || vars.VITE_SERVER_URL || 'http://localhost:3000' }}
          VITE_PORTAL_URL: ${{ vars.VITE_PORTAL_URL_PROD || 'http://localhost:3002' }}
          VITE_OPS_URL: ${{ vars.VITE_OPS_URL_PROD || 'http://localhost:3001' }}

      - uses: actions/upload-artifact@v4
        with:
          name: prod-ops-dist
          path: apps/ops/dist
          retention-days: 1

  swa-portal-build:
    name: Production — Portal (build artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/portal
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL_PROD || vars.VITE_SERVER_URL || 'http://localhost:3000' }}
          VITE_PORTAL_URL: ${{ vars.VITE_PORTAL_URL_PROD || 'http://localhost:3002' }}
          VITE_OPS_URL: ${{ vars.VITE_OPS_URL_PROD || 'http://localhost:3001' }}

      - uses: actions/upload-artifact@v4
        with:
          name: prod-portal-dist
          path: apps/portal/dist
          retention-days: 1

  swa-assets-build:
    name: Production — Add-in assets (build artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/assets
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL_PROD || vars.VITE_SERVER_URL || 'http://localhost:3000' }}
          VITE_PORTAL_URL: ${{ vars.VITE_PORTAL_URL_PROD || 'http://localhost:3002' }}
          VITE_OPS_URL: ${{ vars.VITE_OPS_URL_PROD || 'http://localhost:3001' }}
          VITE_MICROSOFT_CLIENT_ID: ${{ vars.VITE_MICROSOFT_CLIENT_ID_PROD || vars.MICROSOFT_CLIENT_ID || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: prod-assets-dist
          path: apps/addins/assets/dist
          retention-days: 1

  api-container-deploy:
    name: Production — API Web App (restart)
    runs-on: ubuntu-latest
    environment: prod
    needs:
      - api-container-build
      - swa-ops-build
      - swa-portal-build
      - swa-assets-build
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Restart production API Web App
        run: >-
          az webapp restart
          --name "${{ vars.PROD_API_WEBAPP_NAME || 'deck-pack-api-jw' }}"
          --resource-group "${{ vars.PROD_API_RESOURCE_GROUP || 'rg-deck-pack-cloud' }}"

  swa-ops-deploy:
    name: Production — OPS (deploy SWA)
    runs-on: ubuntu-latest
    needs:
      - api-container-build
      - swa-ops-build
      - swa-portal-build
      - swa-assets-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: prod-ops-dist
          path: ops-dist

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_OPS_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ops-dist
          skip_app_build: true

  swa-portal-deploy:
    name: Production — Portal (deploy SWA)
    runs-on: ubuntu-latest
    needs:
      - api-container-build
      - swa-ops-build
      - swa-portal-build
      - swa-assets-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: prod-portal-dist
          path: portal-dist

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_PORTAL_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: portal-dist
          skip_app_build: true

  swa-assets-deploy:
    name: Production — Add-in assets (deploy SWA)
    runs-on: ubuntu-latest
    needs:
      - api-container-build
      - swa-ops-build
      - swa-portal-build
      - swa-assets-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: prod-assets-dist
          path: assets-dist

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_ASSETS_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: assets-dist
          skip_app_build: true
