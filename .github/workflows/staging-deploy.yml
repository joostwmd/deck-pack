# Staging: API (ACR + App Service) + ops / portal / add-in SWAs in one workflow.
# Push to `staging` always runs the full stack (no path filters — front-only merges
# still refresh the API image so staging never drifts from “latest staging commit”).
name: Staging — full release (API + frontends)

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-full-release
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  api-container:
    name: Staging — API container (ACR + restart)
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_REPO: deck-pack-api
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          REGISTRY="${{ vars.ACR_LOGIN_SERVER }}"
          SHA_TAG="${REGISTRY}/${IMAGE_REPO}:${GITHUB_SHA::7}"
          STAGING_TAG="${REGISTRY}/${IMAGE_REPO}:staging"
          TAGS="${SHA_TAG}"$'\n'"${STAGING_TAG}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "extra_tag=${STAGING_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Restart staging API Web App
        run: >-
          az webapp restart
          --name "${{ vars.STAGING_API_WEBAPP_NAME || 'deck-pack-api-staging-jw' }}"
          --resource-group "${{ vars.STAGING_API_RESOURCE_GROUP || 'rg-deck-pack-cloud' }}"

      - name: Summary (API)
        run: |
          {
            echo "### Staging deck-pack-api"
            echo ""
            echo "- \`${{ steps.tags.outputs.sha_tag }}\`"
            echo "- \`${{ steps.tags.outputs.extra_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  swa-ops:
    name: Staging — OPS (Static Web Apps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/ops
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL_STAGING || 'http://localhost:3000' }}

      - name: Upload to Azure Static Web Apps (staging)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_OPS_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/ops/dist
          skip_app_build: true
          production_branch: staging

  swa-portal:
    name: Staging — Portal (Static Web Apps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/portal
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL_STAGING || 'http://localhost:3000' }}

      - name: Upload to Azure Static Web Apps (staging)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_PORTAL_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/portal/dist
          skip_app_build: true
          production_branch: staging

  swa-assets:
    name: Staging — Add-in assets (Static Web Apps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/assets
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL_STAGING || 'http://localhost:3000' }}

      - name: Upload to Azure Static Web Apps (staging)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_ASSETS_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/addins/assets/dist
          skip_app_build: true
          production_branch: staging
