name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/ops/**"
      - "packages/**"
      - "docker/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: docker/api.Dockerfile
            build_args: ""
          - app: ops
            dockerfile: docker/ops.Dockerfile
            build_args: |
              VITE_SERVER_URL=${{ vars.VITE_SERVER_URL || 'http://localhost:3000' }}

    env:
      IMAGE_REPO: deck-pack-${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          SHA_TAG="${{ vars.ACR_LOGIN_SERVER }}/${IMAGE_REPO}:${GITHUB_SHA::7}"
          LATEST_TAG="${{ vars.ACR_LOGIN_SERVER }}/${IMAGE_REPO}:latest"
          {
            echo "sha_tag=${SHA_TAG}"
            echo "latest_tag=${LATEST_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.app }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Summary
        run: |
          {
            echo "### Pushed ${IMAGE_REPO}"
            echo ""
            echo "- \`${{ steps.tags.outputs.sha_tag }}\`"
            echo "- \`${{ steps.tags.outputs.latest_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
