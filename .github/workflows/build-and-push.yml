name: Build and push API image

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "docker/api.Dockerfile"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-and-push.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "docker/api.Dockerfile"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push API image
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: deck-pack-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          REGISTRY="${{ vars.ACR_LOGIN_SERVER }}"
          SHA_TAG="${REGISTRY}/${IMAGE_REPO}:${GITHUB_SHA::7}"
          TAGS="${SHA_TAG}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            PR_TAG="${REGISTRY}/${IMAGE_REPO}:pr-${{ github.event.pull_request.number }}"
            TAGS="${TAGS}"$'\n'"${PR_TAG}"
            echo "extra_tag=${PR_TAG}" >> "$GITHUB_OUTPUT"
          else
            LATEST_TAG="${REGISTRY}/${IMAGE_REPO}:latest"
            TAGS="${TAGS}"$'\n'"${LATEST_TAG}"
            echo "extra_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          fi
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Summary
        run: |
          {
            echo "### Pushed deck-pack-api"
            echo ""
            echo "- \`${{ steps.tags.outputs.sha_tag }}\`"
            echo "- \`${{ steps.tags.outputs.extra_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
