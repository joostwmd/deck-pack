name: Build and push API image

on:
  # Push to any branch builds/pushes an API image. `main` also gets :latest and
  # restarts prod. Any other branch also gets :staging and restarts staging.
  push:
    branches: ["**"]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "docker/api.Dockerfile"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push API image
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: deck-pack-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          REGISTRY="${{ vars.ACR_LOGIN_SERVER }}"
          SHA_TAG="${REGISTRY}/${IMAGE_REPO}:${GITHUB_SHA::7}"
          TAGS="${SHA_TAG}"
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            LATEST_TAG="${REGISTRY}/${IMAGE_REPO}:latest"
            TAGS="${TAGS}"$'\n'"${LATEST_TAG}"
            echo "extra_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          else
            STAGING_TAG="${REGISTRY}/${IMAGE_REPO}:staging"
            TAGS="${TAGS}"$'\n'"${STAGING_TAG}"
            echo "extra_tag=${STAGING_TAG}" >> "$GITHUB_OUTPUT"
          fi
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # App Service keeps the old digest under a moving tag until the site
      # restarts (the image reference string doesn't change), so we force a
      # restart after every push here. Prod on main, staging on PR.
      - name: Restart prod API Web App (after :latest push)
        if: github.ref == 'refs/heads/main'
        run: >-
          az webapp restart
          --name "${{ vars.PROD_API_WEBAPP_NAME || 'deck-pack-api-jw' }}"
          --resource-group "${{ vars.PROD_API_RESOURCE_GROUP || 'rg-deck-pack-cloud' }}"

      - name: Restart staging API Web App (after :staging push)
        if: github.ref != 'refs/heads/main'
        run: >-
          az webapp restart
          --name "${{ vars.STAGING_API_WEBAPP_NAME || 'deck-pack-api-staging-jw' }}"
          --resource-group "${{ vars.STAGING_API_RESOURCE_GROUP || 'rg-deck-pack-cloud' }}"

      - name: Summary
        run: |
          {
            echo "### Pushed deck-pack-api"
            echo ""
            echo "- \`${{ steps.tags.outputs.sha_tag }}\`"
            echo "- \`${{ steps.tags.outputs.extra_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
