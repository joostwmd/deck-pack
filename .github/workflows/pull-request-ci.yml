# Pull requests targeting `staging` — quality checks + tests (no deploy).
# Promotion PRs `staging` → `main` do not run here; only `.github/workflows/pull-request-main-branch-rules.yml` guards `main`.
name: Pull request — quality checks

on:
  pull_request:
    branches: [staging]

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-suite:
    name: Test suite
    uses: ./.github/workflows/test-suite.yml

  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # TanStack Router writes routeTree.gen.ts during Vite build (see README).
      # Build first so generated route types exist; then type-aware oxlint; then check-types (vite+tsc again per app scripts).
      - name: Build
        run: pnpm build

      - name: Oxlint (strict)
        run: pnpm oxlint:strict

      - name: Typecheck
        run: pnpm check-types

  docker-build-api:
    name: Docker build (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: false
          cache-from: type=gha,scope=api-pr
          cache-to: type=gha,mode=max,scope=api-pr
