name: Deploy Static Web Apps (staging)

on:
  # Deploy to staging on every push to any non-main branch. This avoids the SWA
  # action's pull_request preview behavior and always publishes to the main
  # *.azurestaticapps.net URL of the STAGING SWA resource.
  push:
    branches-ignore: [main]
    paths:
      - "apps/ops/**"
      - "apps/portal/**"
      - "apps/addins/assets/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-static-web-apps-staging.yml"
  workflow_dispatch:

concurrency:
  group: swa-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-ops:
    name: Deploy OPS to staging SWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/ops
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL_STAGING || 'http://localhost:3000' }}

      - name: Upload to Azure Static Web Apps (staging)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_OPS_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/ops/dist
          skip_app_build: true
          # Make the currently pushed branch the "production" branch of the
          # staging SWA resource so uploads land on its main URL (no -1 preview).
          production_branch: ${{ github.ref_name }}

  deploy-portal:
    name: Deploy portal to staging SWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/portal
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL_STAGING || 'http://localhost:3000' }}

      - name: Upload to Azure Static Web Apps (staging)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_PORTAL_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/portal/dist
          skip_app_build: true
          production_branch: ${{ github.ref_name }}

  deploy-assets:
    name: Deploy add-in assets to staging SWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/assets
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL_STAGING || 'http://localhost:3000' }}

      - name: Upload to Azure Static Web Apps (staging)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_ASSETS_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/addins/assets/dist
          skip_app_build: true
          production_branch: ${{ github.ref_name }}
