name: Deploy Static Web Apps (prod)

on:
  push:
    branches: [main]
    paths:
      - "apps/ops/**"
      - "apps/portal/**"
      - "apps/addins/assets/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-static-web-apps.yml"
  workflow_dispatch:

concurrency:
  group: swa-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-ops:
    name: Deploy OPS to Azure Static Web Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/ops
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL || 'http://localhost:3000' }}

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_OPS_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/ops/dist
          skip_app_build: true

  deploy-portal:
    name: Deploy portal to Azure Static Web Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/portal
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL || 'http://localhost:3000' }}

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_PORTAL_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/portal/dist
          skip_app_build: true

  deploy-assets:
    name: Deploy add-in assets to Azure Static Web Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build --filter=@deck-pack/assets
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL || 'http://localhost:3000' }}

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_ASSETS_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/addins/assets/dist
          skip_app_build: true
