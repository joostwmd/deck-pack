# Staging backend: Docker image to ACR + restart staging App Service.
# Triggers only when branch `staging` changes (after merging a feature PR).
name: Staging — API container (ACR + App Service)

on:
  push:
    branches: [staging]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "docker/api.Dockerfile"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/staging-api-container.yml"
  workflow_dispatch:

concurrency:
  group: staging-api-container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-push-restart:
    name: Build, push to ACR, restart staging App Service
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_REPO: deck-pack-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          REGISTRY="${{ vars.ACR_LOGIN_SERVER }}"
          SHA_TAG="${REGISTRY}/${IMAGE_REPO}:${GITHUB_SHA::7}"
          STAGING_TAG="${REGISTRY}/${IMAGE_REPO}:staging"
          TAGS="${SHA_TAG}"$'\n'"${STAGING_TAG}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "extra_tag=${STAGING_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Restart staging API Web App
        run: >-
          az webapp restart
          --name "${{ vars.STAGING_API_WEBAPP_NAME || 'deck-pack-api-staging-jw' }}"
          --resource-group "${{ vars.STAGING_API_RESOURCE_GROUP || 'rg-deck-pack-cloud' }}"

      - name: Summary
        run: |
          {
            echo "### Staging deck-pack-api"
            echo ""
            echo "- \`${{ steps.tags.outputs.sha_tag }}\`"
            echo "- \`${{ steps.tags.outputs.extra_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
